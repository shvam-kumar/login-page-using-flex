<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">


        <div class="content">

            <img src="https://images.unsplash.com/photo-1626806819282-2c1dc01a5e0c?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="image">

        </div>

     
        <div class="content2">

            <div class="login-box">

                <h1 class="heading">Hello Again</h1>

                <p class="para">
                    Welcome back, we missed you!
                </p>

                <form>
                    <label for="">Name</label>
                    <input type="text" placeholder="Enter your name">
                    <label for="">Email</label>
                    <input type="email" placeholder="Enter your email">
                    <label for="">Password</label>
                    <input type="password" placeholder="Enter your password">
                    <p class="forget"><a href="#">forget password</a></p>

                    <button type="submit">
                        Login
                    </button>

                    <p class="newmember">New member ? <a href="#">register here</a></p>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
